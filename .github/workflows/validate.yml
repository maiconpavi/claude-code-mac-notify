name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: lint json + shell
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: validate json
        run: |
          set -euo pipefail
          for f in \
            .claude-plugin/plugin.json \
            .claude-plugin/marketplace.json \
            hooks/hooks.json
          do
            echo "validating $f"
            jq -e . < "$f" > /dev/null
          done

      - name: bash -n on notify.sh
        run: bash -n scripts/notify.sh

      - name: shellcheck on notify.sh
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          shellcheck scripts/notify.sh
